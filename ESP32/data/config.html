<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cWall - Einstellungen</title>
    <link rel="stylesheet" href="config.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Einstellungen</h1>
            <button class="back-btn" onclick="window.close()">Zurück</button>
        </div>
        
        <form id="configForm" onsubmit="saveConfig(event)">
            <div class="section">
                <h2>Allgemein</h2>
                <div class="input-group">
                    <label for="gameDurationMs">Spieldauer (Sekunden)</label>
                    <input type="number" id="gameDurationMs" min="10" max="300" step="1" required>
                </div>
            </div>

            <div class="section">
                <h2>Farbeinstellungen</h2>
                <div class="input-group color-group">
                    <label for="colorP1">Farbe Spieler 1</label>
                    <div class="color-wrapper"><input type="color" id="colorP1"></div>
                </div>
                <div class="input-group color-group">
                    <label for="colorP2">Farbe Spieler 2</label>
                    <div class="color-wrapper"><input type="color" id="colorP2"></div>
                </div>
                <div class="input-group color-group">
                    <label for="colorP1Ripple">Ripple Farbe Spieler 1</label>
                    <div class="color-wrapper"><input type="color" id="colorP1Ripple"></div>
                </div>
                <div class="input-group color-group">
                    <label for="colorP2Ripple">Ripple Farbe Spieler 2</label>
                    <div class="color-wrapper"><input type="color" id="colorP2Ripple"></div>
                </div>
            </div>

            <button type="submit" class="save-btn" id="saveBtn">
                <span id="saveBtnText">Speichern</span>
            </button>
        </form>

        <div class="section" style="margin-top: 40px;">
            <h2 style="color: #ff4757;">Gefahrenzone</h2>
            <button type="button" class="reset-btn" id="resetBtn" onclick="showResetConfirm()">60s Highscore zurücksetzen</button>
            <div id="resetConfirmField" style="display: none; margin-top: 15px; padding: 15px; border: 1px solid #ff4757; border-radius: 8px; background: rgba(255, 71, 87, 0.1);">
                <p style="color: #ff4757; margin-top: 0; margin-bottom: 15px; text-align: center; font-weight: bold;">Möchten Sie wirklich alle Highscores löschen?</p>
                <div style="display: flex; gap: 10px;">
                    <button type="button" class="reset-btn" style="flex: 1; background: #ff4757; color: white;" onclick="confirmReset(true)">Ja</button>
                    <button type="button" class="back-btn" style="flex: 1; text-align: center; width: 100%;" onclick="confirmReset(false)">Nein</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="config.js"></script>
</body>
</html>
