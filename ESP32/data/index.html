<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cWall</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>

    <h1 class="heading">cWall</h1>
    
    <!-- Header Buttons -->
    <div style="position: absolute; top: 20px; right: 20px; display: flex; gap: 10px;">
        <button onclick="window.open('config.html', '_blank')" style="background-color: #333; color: #fff; border: 1px solid #555; padding: 8px 16px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 5px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            Einstellungen
        </button>
        <button onclick="window.open('logs.html', '_blank')" style="background-color: #333; color: #fff; border: 1px solid #555; padding: 8px 16px; cursor: pointer; border-radius: 4px;">System Logs</button>
    </div>

    <div class="container" id="endofgamescreen" style="display: flex">

        <div class="left-section">
            <div class="highscores">
                <h2>Highscores</h2>
                <div id="highscoreDisplay" class="highscore-list">
                    Warte auf ESP32...
                </div>
            </div>
        </div>

        <div class="right-section">
            <div class="player-panel">

                <div class="field">
                    <label>Letztes Spiel:</label>
                    <div class="box" id="finalScoreDisplay">Noch kein Spiel gespielt</div>
                </div>

                <div class="field" id="nameInputSection" style="display: none; margin-top: 20px;">
                    <label style="color: #d9534f; font-weight: bold; font-size: 16px;">NEUER HIGHSCORE!</label>
                    <form onsubmit="handlePlayerNameForm(event)">
                        <input type="text" id="playerNameInput" class="box" placeholder="Dein Name" maxlength="15" required style="border-color: #d9534f; outline: none;">
                        <button type="submit" class="btn primary" style="width: 100%; margin-top: 10px;">Namen speichern</button>
                    </form>
                </div>

            </div>
        </div>
    </div>
    
    <div class="container" id="gamescreen" style="display: none; flex-direction: column; align-items: center; justify-content: center;">

        <div style="font-size: 32px; font-weight: 800; margin-bottom: 20px;">
            Zeit: <span id="timerValue" style="color: #d9534f;">60</span>s
        </div>

        <div style="display: flex; width: 100%; justify-content: space-around;">
            
            <div class="score">
                <h2 id="p1Label">Score</h2>
                <div class="points" id="scoreP1">0</div>
            </div>

            <div class="score" id="p2Section" style="display: none;">
                <h2>Player 2</h2>
                <div class="points" id="scoreP2">0</div>
            </div>

        </div>

    </div>

</body>
</html>
